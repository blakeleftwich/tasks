<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Task Board</title>
  <meta name="description" content="A simple daily to-do board: To Do, In Progress, Done — with due dates, priorities, labels, carry-over, and cross-device sync." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="title-block">
      <h1 id="app-title" class="app-title">Daily Task Board</h1>
      <div id="board-controls" class="board-controls" hidden></div>
    </div>

    <div class="date-nav">
      <button id="prev-day" class="icon-btn" title="Previous day" aria-label="Previous day">◀</button>
      <span class="date-display-wrap">
        <button id="date-display" class="date-display" type="button" aria-label="Pick a date"></button>
        <input id="date-picker" type="date" class="date-picker" aria-label="Select date" />
      </span>
      <button id="next-day" class="icon-btn" title="Next day" aria-label="Next day">▶</button>
      <button id="today-btn" class="ghost-btn">Today</button>
    </div>

    <div class="header-right">
      <div id="auth-bar" class="auth-bar" hidden></div>
    </div>
  </header>

  <div class="toolbar">
    <input id="search" class="search-input" type="text" placeholder="Search tasks…  ( / )" aria-label="Search tasks" />
    <button id="carry-over" class="ghost-btn carry-btn" hidden></button>
  </div>

  <main id="board" class="board">
    <!-- Columns rendered by app.js -->
  </main>

  <footer class="app-footer">
    <div class="shortcuts">
      <span><kbd>N</kbd> New</span>
      <span><kbd>↵</kbd> Open</span>
      <span><kbd>← ↑ ↓ →</kbd> Move</span>
      <span><kbd>C</kbd> Complete</span>
      <span><kbd>Del</kbd> Delete</span>
      <span><kbd>/</kbd> Search</span>
      <span><kbd>Esc</kbd> Close</span>
    </div>
  </footer>

  <!-- Confirmation modal -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h3 id="modal-title" class="modal-title">Delete task?</h3>
      <p id="modal-message" class="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="ghost-btn" type="button">Cancel</button>
        <button id="modal-confirm" class="danger-btn" type="button">Delete</button>
      </div>
    </div>
  </div>

  <!-- Card template -->
  <template id="card-template">
    <article class="card">
      <div class="card-top">
        <button class="check" type="button" aria-label="Advance to next column"></button>
        <input class="card-title" type="text" placeholder="Task name" readonly />
        <button class="delete-btn" type="button" title="Delete task" aria-label="Delete task">×</button>
      </div>

      <div class="card-meta">
        <span class="due-badge" hidden></span>
        <span class="priority-pill" hidden></span>
        <span class="progress-chip" hidden></span>
      </div>

      <div class="card-body">
        <div class="card-body-inner">
          <textarea class="card-notes" placeholder="Add a description…" rows="1"></textarea>

          <div class="card-checklist">
            <ul class="checklist-items"></ul>
            <input class="checklist-input" type="text" placeholder="+ Add a step…" aria-label="Add a step" />
          </div>

          <button class="props-toggle" type="button" aria-expanded="false">More ▾</button>
          <div class="card-props-wrap">
            <div class="card-props">
              <label class="card-menu-label">Priority</label>
              <select class="priority-select" aria-label="Priority">
                <option value="">None</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
              <label class="card-menu-label">Due date</label>
              <input class="due-input" type="date" aria-label="Due date" />
              <label class="card-menu-label">Color</label>
              <div class="label-swatches" role="group" aria-label="Card color"></div>
            </div>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>

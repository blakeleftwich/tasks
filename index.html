<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>New Project</title>
  <meta name="description" content="A simple project board: tabs, task sets, and cards — with due dates, tags, colours, and cross-device sync." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="title-block">
      <button id="theme-btn" class="theme-btn" type="button" aria-label="Change colour theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.563-2.512 5.563-5.563C22 6.012 17.5 2 12 2z"/></svg>
      </button>
      <h1 id="app-title" class="app-title">New Project</h1>
      <div id="board-controls" class="board-controls" hidden></div>
    </div>

    <div class="header-right">
      <div id="auth-bar" class="auth-bar" hidden></div>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-left">
      <input id="search" class="search-input" type="text" placeholder="Search tasks…  ( / )" aria-label="Search tasks" />
      <button id="view-toggle" class="ghost-btn" type="button"></button>
    </div>
  </div>

  <nav id="tab-bar" class="tab-bar" aria-label="Board tabs"><!-- tabs rendered by app.js --></nav>

  <main id="board" class="board">
    <!-- Columns rendered by app.js -->
  </main>

  <footer class="app-footer">
    <div class="shortcuts">
      <span><kbd>N</kbd> New</span>
      <span><kbd>↵</kbd> Open</span>
      <span><kbd>← ↑ ↓ →</kbd> Move</span>
      <span><kbd>C</kbd> Complete</span>
      <span><kbd>Del</kbd> Delete</span>
      <span><kbd>/</kbd> Search</span>
      <span><kbd>Esc</kbd> Close</span>
    </div>
  </footer>

  <!-- Confirmation modal -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h3 id="modal-title" class="modal-title">Delete task?</h3>
      <p id="modal-message" class="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="ghost-btn" type="button">Cancel</button>
        <button id="modal-confirm" class="danger-btn" type="button">Delete</button>
      </div>
    </div>
  </div>

  <!-- Card template -->
  <template id="card-template">
    <article class="card">
      <div class="card-top">
        <button class="check" type="button" aria-label="Advance to next column"></button>
        <input class="card-title" type="text" placeholder="Task name" readonly />
        <button class="delete-btn" type="button" title="Delete task" aria-label="Delete task">×</button>
      </div>

      <div class="card-meta">
        <span class="assignee-chip" hidden></span>
        <span class="due-badge" hidden></span>
        <span class="tag-pill" hidden></span>
        <span class="progress-chip" hidden></span>
      </div>

      <div class="card-body">
        <div class="card-body-inner">
          <textarea class="card-notes" placeholder="Add a description…" rows="1"></textarea>

          <div class="card-checklist">
            <ul class="checklist-items"></ul>
            <input class="checklist-input" type="text" placeholder="+ Add a step…" aria-label="Add a step" />
          </div>

          <div class="card-attachments" hidden></div>

          <div class="block-add">
            <button class="block-add-btn" type="button">+ Add something</button>
            <div class="tag-menu block-menu" hidden></div>
            <input class="attach-input" type="file" hidden />
          </div>

          <button class="props-toggle" type="button" aria-expanded="false">More ▾</button>
          <div class="card-props-wrap">
            <div class="card-props">
              <label class="card-menu-label">Tag</label>
              <div class="tag-select">
                <button class="tag-trigger" type="button">None ▾</button>
                <div class="tag-menu" hidden></div>
              </div>
              <label class="card-menu-label">Assign to</label>
              <div class="tag-select assignee-select">
                <button class="tag-trigger assignee-trigger" type="button">Nobody ▾</button>
                <div class="tag-menu assignee-menu" hidden></div>
              </div>
              <label class="card-menu-label">Due date</label>
              <input class="due-input" type="date" aria-label="Due date" />
              <label class="card-menu-label">Color</label>
              <div class="label-swatches" role="group" aria-label="Card color"></div>
            </div>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
